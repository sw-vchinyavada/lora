# LoRA Credit Scoring — Docker Compose
#
# Services:
#   app           Gradio dissertation demo     http://localhost:7860
#   mfi-api       MFI portal REST API          http://localhost:8000
#   mfi-frontend  MFI React UI (nginx)         http://localhost:5174
#   train         Full methodology training 50K (profile train)
#   train-quick   Quick demo training 5K (profile train-quick)
#
# Quick start:  docker compose up -d --build
# Docs:         README.md § Docker

services:
  # Gradio dissertation demo UI
  app:
    build: .
    ports:
      - "7860:7860"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./results:/app/results
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # MFI portal API (LoRA scoring + applicant DB)
  mfi-api:
    build:
      context: .
      dockerfile: mfi_portal/backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./results:/app/results
      - ./mfi_portal/data:/app/mfi_portal/data
    environment:
      - MFI_DATABASE_URL=sqlite:////app/mfi_portal/data/mfi.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # MFI portal React UI (proxies /api to mfi-api)
  mfi-frontend:
    build:
      context: .
      dockerfile: mfi_portal/frontend/Dockerfile
    ports:
      - "5174:5174"
    depends_on:
      mfi-api:
        condition: service_healthy

  # Full methodology training (50K per §3.3.3)
  train:
    build: .
    command: python scripts/train.py --dataset zimbabwe_synthetic --n-samples 50000 --epochs 15 --export-figures
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./results:/app/results
    profiles:
      - train

  # Quick training for local demos (5K)
  train-quick:
    build: .
    command: python scripts/train.py --dataset zimbabwe_synthetic --n-samples 5000 --epochs 10 --export-figures
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./results:/app/results
    profiles:
      - train-quick
